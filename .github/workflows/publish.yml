name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      # Skip deploy when a release commit is pushed to main: the tag push (firing
      # against the same SHA) will handle the actual release deploy. Without this
      # guard, both runs race on the deploy and the loser gets a 409 Conflict.
      - name: Decide whether to deploy
        id: decide
        run: |
          VERSION=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          if [[ "$GITHUB_REF" == "refs/heads/main" && "$VERSION" != *-SNAPSHOT ]]; then
            echo "Skipping deploy: release version $VERSION on main push — the tag run handles release deploys."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Will deploy version $VERSION (ref $GITHUB_REF)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy (runs tests then publishes)
        if: steps.decide.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B deploy

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # target/brace-*.jar already matches both the main and -sources jars;
          # listing target/brace-*-sources.jar explicitly attaches it twice and
          # GitHub's upload endpoint returns 404 on the duplicate name.
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            target/brace-*.jar \
            target/brace-*.zip
